<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Panel IOL</title>
  <style>
    :root {
      --bg: #eef1f0;
      --bg-soft: #f7f9f8;
      --surface: #ffffff;
      --text: #273136;
      --muted: #6f7d78;
      --border: #dbe3df;
      --green: #2d8a68;
      --green-soft: #e3f2eb;
      --red: #bb4f5b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, #f9fbfa 0, transparent 45%),
        radial-gradient(circle at 100% 100%, #e8f3ee 0, transparent 38%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
      min-height: 100%;
      display: flex;
      padding: clamp(14px, 2.2vw, 24px);
    }

    .card {
      width: min(760px, 100%);
      margin: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(29, 49, 42, 0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 100%;
    }

    .header {
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #fbfdfc 0%, #f4f8f6 100%);
    }

    .title {
      margin: 0;
      font-size: clamp(1.4rem, 1.2rem + 0.7vw, 1.8rem);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .content {
      display: grid;
      gap: 16px;
      padding: 18px;
      overflow: auto;
    }

    .section {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid #dce5e1;
      border-radius: 12px;
      background: #fbfdfc;
    }

    .section-title {
      margin: 0;
      color: #49635b;
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-weight: 700;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input,
    select {
      border: 1px solid #cedbd5;
      border-radius: 10px;
      padding: 9px 10px;
      color: var(--text);
      background: #ffffff;
      font-size: 0.92rem;
      flex: 1 1 180px;
      min-width: 140px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.92rem;
      font-weight: 600;
      background: var(--green);
      color: white;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      background: #247a5b;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    @media (max-width: 760px) {
      .header {
        padding: 16px;
      }

      .content {
        padding: 14px;
      }

      .row > button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <header class="header">
      <h1 class="title">Ingreso a Cuenta</h1>
      <p class="subtitle">Seleccioná una cuenta existente o agregá una nueva para usar en todas las ventanas.</p>
    </header>

    <section class="content">
      <section class="section">
        <h2 class="section-title">Cuenta guardada</h2>
        <div class="row">
          <select id="saved-user-select">
            <option value="">Usuarios guardados</option>
          </select>
          <button id="btn-access-account" type="button">Acceder</button>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">Agregar cuenta</h2>
        <div class="row">
          <input id="username-input" type="text" placeholder="Usuario IOL" autocomplete="username">
          <input id="password-input" type="password" placeholder="Contraseña" autocomplete="current-password">
          <button id="btn-add-account" type="button">Agregar cuenta</button>
        </div>
      </section>
    </section>
  </main>

  <script src="./login.js"></script>
</body>
</html>
