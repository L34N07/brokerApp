<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operaciones - Panel IOL</title>
  <style>
    :root {
      --bg: #eef1f0;
      --bg-soft: #f7f9f8;
      --surface: #ffffff;
      --text: #273136;
      --muted: #6f7d78;
      --border: #dbe3df;
      --green: #2d8a68;
      --green-soft: #e3f2eb;
      --red: #bb4f5b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, #f9fbfa 0, transparent 45%),
        radial-gradient(circle at 100% 100%, #e8f3ee 0, transparent 38%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
      min-height: 100%;
      padding: clamp(12px, 2vw, 24px);
      display: flex;
      overflow: hidden;
    }

    .layout {
      width: min(1720px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
      min-height: 0;
    }

    .title {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 4px 0 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(29, 49, 42, 0.06);
      overflow: hidden;
      min-height: 0;
    }

    .panel-tabs {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .panel-body {
      padding: 14px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      background: var(--green);
      color: white;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    button:hover:not(:disabled) {
      background: #247a5b;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status-text {
      font-size: 0.93rem;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f6f8f7;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .status-text.ok {
      color: #1f6f53;
      background: var(--green-soft);
      border-color: #cde7db;
    }

    .status-text.error {
      color: #8e2f3a;
      background: #f9ecee;
      border-color: #f2d4d8;
    }

    .data-range {
      color: #49635b;
      font-size: 0.88rem;
      background: #f5faf7;
      border: 1px solid #d6e9e0;
      border-radius: 999px;
      padding: 6px 10px;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .main-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #f8fbf9;
      gap: 2px;
      padding: 8px 8px 0;
    }

    .main-tab-btn {
      border: 1px solid transparent;
      border-radius: 10px 10px 0 0;
      padding: 10px 14px;
      color: #49635b;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
    }

    .main-tab-btn.active {
      background: white;
      border-color: var(--border);
      border-bottom-color: white;
      color: #1f6f53;
    }

    .tab-panel {
      display: none;
      padding: 14px;
      min-height: 0;
      overflow: auto;
    }

    .tab-panel.active {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .summary-note {
      margin: 0;
      font-size: 0.92rem;
      color: #49635b;
    }

    .add-zone {
      padding: 16px;
      border: 1px dashed #c7dad1;
      border-radius: 12px;
      background: #fbfdfc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 92px;
    }

    .add-chart-btn {
      width: 38px;
      height: 38px;
      padding: 0;
      border-radius: 999px;
      font-size: 1.3rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 1fr));
      gap: 12px;
      align-content: start;
    }

    .add-zone-grid {
      min-height: 78px;
    }

    .chart-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      overflow: hidden;
    }

    .chart-head {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      background: #f8fbf9;
    }

    .chart-control {
      display: grid;
      gap: 5px;
    }

    .chart-control label {
      font-size: 0.82rem;
      color: #49635b;
      font-weight: 600;
    }

    .symbol-select {
      border: 1px solid #cedbd5;
      border-radius: 10px;
      padding: 8px 10px;
      background: #fbfdfc;
      color: var(--text);
      font-size: 0.9rem;
    }

    .mode-tabs {
      display: flex;
      gap: 8px;
      padding: 10px 10px 0;
    }

    .mode-tab {
      border: 1px solid #d0ded8;
      border-radius: 999px;
      background: #f2f7f5;
      color: #49635b;
      padding: 6px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }

    .mode-tab.active {
      background: #e7f4ed;
      border-color: #bfdccb;
      color: #1f6f53;
    }

    .chart-content {
      padding: 10px;
    }

    .summary-groups {
      display: grid;
      gap: 12px;
    }

    .summary-group {
      border: 1px solid #e4ece8;
      border-radius: 10px;
      padding: 8px;
      background: #fcfefd;
    }

    .summary-group-title {
      margin: 0 0 8px 0;
      color: #49635b;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .summary-table th,
    .summary-table td {
      border-bottom: 1px solid #edf2ef;
      text-align: left;
      padding: 8px 6px;
    }

    .summary-table thead th {
      background: #f8fbf9;
      color: #49635b;
      font-weight: 700;
      text-align: right;
    }

    .summary-table tbody td {
      text-align: right;
    }

    .placeholder {
      color: #49635b;
      font-size: 0.94rem;
      margin: 0;
    }

    @media (max-width: 1280px) {
      .charts-grid {
        grid-template-columns: repeat(2, minmax(280px, 1fr));
      }
    }

    @media (max-width: 980px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .panel-body {
        padding: 12px;
      }

      .main-tabs {
        overflow: auto;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <header>
      <h1 class="title">Operaciones</h1>
      <p class="subtitle">Vista por simbolo con tarjetas dinamicas de Compra/Venta.</p>
    </header>

    <section class="panel">
      <div class="panel-body toolbar">
        <button id="btn-reload-operations" type="button">Recargar operaciones</button>
        <button id="btn-change-account" type="button">Cambiar Cuenta</button>
        <span id="status-text" class="status-text">Cargando cuenta activa...</span>
        <span id="data-range" class="data-range"></span>
      </div>
    </section>

    <section class="panel panel-tabs">
      <div class="main-tabs">
        <button type="button" class="main-tab-btn active" data-main-tab="tab-symbols">Resumen por simbolo</button>
        <button type="button" class="main-tab-btn" data-main-tab="tab-secondary">Otro tab</button>
      </div>

      <div id="tab-symbols" class="tab-panel active" data-main-panel>
        <p id="data-summary" class="summary-note">Sin datos cargados.</p>
        <div id="charts-grid" class="charts-grid">
          <div id="grid-add-zone" class="add-zone add-zone-grid">
            <button id="btn-add-chart-initial" class="add-chart-btn" type="button" title="Agregar tarjeta">+</button>
          </div>
        </div>
      </div>

      <div id="tab-secondary" class="tab-panel" data-main-panel>
        <p class="placeholder">Tab reservado para futuras vistas de operaciones.</p>
      </div>
    </section>
  </main>

  <script src="./operations.js"></script>
</body>
</html>
